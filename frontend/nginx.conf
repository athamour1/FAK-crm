server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy /api → NestJS backend ──────────────────────────────────────────
    location /api {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Service worker — must never be cached ────────────────────────────────
    # The browser checks for updates on every navigation; a stale sw.js would
    # prevent users from receiving new versions of the app.
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Service-Worker-Allowed "/";
        expires off;
    }

    # ── PWA manifest — short cache so installs get fresh metadata ────────────
    location = /manifest.json {
        add_header Cache-Control "public, max-age=3600";
        default_type application/manifest+json;
    }

    # ── Workbox precache manifest (changes on every build) ───────────────────
    location ~* workbox-.*\.js$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Static assets — long-lived immutable cache ───────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA / PWA fallback — all unmatched routes → index.html ───────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
